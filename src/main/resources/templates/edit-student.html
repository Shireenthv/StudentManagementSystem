<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #f0f2f5; 
            font-family: 'Poppins', sans-serif;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .edit-card { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px; 
        }
        .btn-update {
            background: linear-gradient(135deg, #007bff 0%, #00d4ff 100%);
            border: none;
            color: white;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="edit-card">
    <h3 class="text-center mb-4">Update Profile</h3>
    
    <form th:action="@{/add}" th:object="${student}" method="post">
        <input type="hidden" th:field="*{id}">

		<div class="col-md-3">
		    <label class="form-label small fw-bold">Student Name</label>
		    <input type="text" name="studentName" class="form-control" placeholder="Full Name">
		    <div th:if="${#fields.hasErrors('studentName')}" th:errors="*{studentName}" class="text-danger sx-small"></div>
		</div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label small fw-bold text-muted">Gender</label>
                <select th:field="*{gender}" class="form-select">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label small fw-bold text-muted">Grade</label>
                <input type="text" th:field="*{grade}" class="form-control" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold text-muted">Course</label>
            <input type="text" th:field="*{course}" class="form-control" required>
        </div>
		<div class="col-md-2">
		    <label class="form-label small fw-bold">Phone</label>
		    <input type="tel" name="phoneNumber" class="form-control" placeholder="10 Digits">
		    <div th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="text-danger sx-small"></div>
		</div>

        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-update p-2">Save Changes</button>
            <a href="/" class="btn btn-light text-muted p-2">Go Back</a>
        </div>
    </form>
</div>

</body>
</html>
