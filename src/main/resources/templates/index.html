<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Management Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        body { background-color: #f4f7fe; font-family: 'Inter', sans-serif; color: #2b3674; }
        .navbar { background: #ffffff; border-bottom: 1px solid #e0e0e0; padding: 1rem 2rem; }
        .main-card { background: white; border: none; border-radius: 20px; box-shadow: 0px 20px 50px rgba(0, 0, 0, 0.05); padding: 25px; }
        .form-control, .form-select { border-radius: 12px; padding: 10px 15px; border: 1px solid #E0E5F2; }
        .btn-primary-custom { background: #4318FF; color: white; border-radius: 12px; padding: 10px 25px; border: none; font-weight: 600; }
        .btn-primary-custom:hover { background: #3311cc; color: white; }
        .table thead th { color: #A3AED0; font-size: 12px; letter-spacing: 1px; border: none; }
        .badge-grade { background: #e1f5fe; color: #01579b; padding: 6px 12px; border-radius: 8px; font-weight: 700; }
        .stat-card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0px 10px 20px rgba(0,0,0,0.02); }
    </style>
</head>
<body>

<nav class="navbar sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#"><i class="bi bi-mortarboard-fill me-2 text-primary"></i> STUDENT PORTAL</a>
        <div class="d-flex align-items-center">
            <span class="badge bg-soft-primary text-primary me-3">Welcome, Admin</span>
            <a th:href="@{/login}" class="btn btn-sm btn-outline-danger rounded-pill">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="stat-card d-flex align-items-center">
                <div class="fs-2 me-3 text-primary"><i class="bi bi-people-fill"></i></div>
                <div>
                    <h6 class="text-muted mb-0 small">Total Students</h6>
                    <h4 class="fw-bold mb-0" th:text="${listStudents.size()}">0</h4>
                </div>
            </div>
        </div>
    </div>

    <div class="main-card mb-4">
        <h5 class="fw-bold mb-4"><i class="bi bi-plus-circle me-2"></i>New Enrollment</h5>
        <form th:action="@{/add}" method="POST" class="row g-3">
            <div class="col-md-3">
                <label class="form-label small fw-bold">Student Name</label>
                <input type="text" name="studentName" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="col-md-2">
                <label class="form-label small fw-bold">Gender</label>
                <select name="gender" class="form-select" required>
                    <option value="" disabled selected>Choose...</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label small fw-bold">Course</label>
                <input type="text" name="course" class="form-control" placeholder="e.g. Java" required>
            </div>
            <div class="col-md-2">
                <label class="form-label small fw-bold">Phone</label>
                <input type="tel" name="phoneNumber" class="form-control" placeholder="Mobile Number" required>
            </div>
            <div class="col-md-1">
                <label class="form-label small fw-bold">Grade</label>
                <input type="text" name="grade" class="form-control" placeholder="A+" required>
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button type="submit" class="btn btn-primary-custom w-100">Add Student</button>
            </div>
        </form>
    </div>

    <div class="main-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0">Active Students</h5>
            <div class="input-group w-25">
                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
                <input type="text" id="searchInput" class="form-control border-start-0" placeholder="Search by name...">
            </div>
        </div>
        
        <table class="table align-middle" id="studentTable">
            <thead>
                <tr>
                    <th>STUDENT INFO</th>
                    <th>COURSE</th>
                    <th>GENDER</th>
                    <th>PHONE</th>
                    <th>GRADE</th>
                    <th class="text-center">MANAGE</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${listStudents}">
                    <td>
                        <div class="fw-bold" th:text="${s.studentName}">John Doe</div>
                        <div class="text-muted small" th:text="'ID: #' + ${s.id}"></div>
                    </td>
                    <td th:text="${s.course}">Course Name</td>
                    <td th:text="${s.gender}">Gender</td>
                    <td th:text="${s.phoneNumber}">Phone</td>
                    <td><span class="badge-grade" th:text="${s.grade}">A</span></td>
                    <td class="text-center">
                        <a th:href="@{/edit/{id}(id=${s.id})}" class="btn btn-sm btn-light text-primary me-2 shadow-sm"><i class="bi bi-pencil-square"></i></a>
                        <a th:href="@{/delete/{id}(id=${s.id})}" 
                           class="btn btn-sm btn-light text-danger shadow-sm" 
                           onclick="return confirm('Delete this record?')">
                           <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Live Search Functionality
    document.getElementById('searchInput').addEventListener('keyup', function() {
        let filter = this.value.toUpperCase();
        let rows = document.querySelector("#studentTable tbody").rows;
        for (let i = 0; i < rows.length; i++) {
            let name = rows[i].cells[0].textContent.toUpperCase();
            rows[i].style.display = name.indexOf(filter) > -1 ? "" : "none";
        }
    });
	// Add this inside your existing <script> tag
	window.onload = function() {
	    var toastEl = document.getElementById('successToast');
	    if (toastEl) {
	        var toast = new bootstrap.Toast(toastEl);
	        toast.show();
	    }
	};
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="successToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true" th:if="${message}">
    <div class="d-flex">
      <div class="toast-body">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${message}">Success message here</span>
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>
</html>
