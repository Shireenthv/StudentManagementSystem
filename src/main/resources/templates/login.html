<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login | Student Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Background Gradient matching your image */
            background: linear-gradient(45deg, #f0167c, #2a0894);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Floating Spheres */
        .sphere {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #004e92);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.3);
            z-index: 1;
        }
        .s1 { width: 150px; height: 150px; top: 10%; left: 15%; background: #00d4ff; }
        .s2 { width: 100px; height: 100px; bottom: 15%; left: 10%; background: #2a0894; }
        .s3 { width: 200px; height: 200px; top: 50%; right: 5%; background: #f0167c; opacity: 0.8;}
        .s4 { width: 60px; height: 60px; top: 20%; right: 25%; background: #00d4ff; }

        .glass-card {
            width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1); /* Transparent white */
            backdrop-filter: blur(15px); /* This creates the frost effect */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            z-index: 10;
            color: white;
            text-align: center;
        }

        .login-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .form-label {
            display: block;
            text-align: left;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 8px;
            color: white;
            padding: 12px;
            margin-bottom: 20px;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.3);
            color: white;
            box-shadow: none;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .btn-login {
            background: #ffcc00; /* Yellow button like the image */
            color: #333;
            border: none;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #e6b800;
            transform: scale(1.02);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="sphere s1"></div>
    <div class="sphere s2"></div>
    <div class="sphere s3"></div>
    <div class="sphere s4"></div>

    <div class="glass-card">
        <div class="login-title">Login</div>

        <p th:if="${error}" class="text-warning small mb-3">Invalid Credentials!</p>

        <form th:action="@{/login}" method="POST">
            <div class="mb-3">
                <label class="form-label">Username or email</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••" required>
            </div>

            <button type="submit" class="btn-login">Login</button>
        </form>

        <div class="footer-text">
            Don't have an account? <span style="color: white; cursor: pointer;">Sign up</span>
        </div>
    </div>

</body>
</html>
